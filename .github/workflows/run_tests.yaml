name: Run Consul Pipeline

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "CODE-OF-CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "SECURITY.md"


jobs:
  Wait-for-images:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_wait }}
    runs-on: ubuntu-latest
    outputs:
      conclusion: ${{ steps.wait.outputs.conclusion }}
    steps:
      - name: Wait for dev_build.yml to complete
        uses: netcracker/qubership-workflow-hub/actions/wait-for-workflow@3e428f45132119ce49d90f3770a45d4fe1d1078d  #v2.0.4
        id: wait
        with:
          workflow: dev_build.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          poll-interval: 20
  Consul-Pipeline:
    needs: Wait-for-images
    if: always() && (needs.Wait-for-images.result == 'success' || needs.Wait-for-images.result == 'skipped')
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@247c69038e00f2a9e283412e902555f84b16dab2 # v1.8.0
    with:
      service_branch: '${{ inputs.service_branch || github.head_ref || github.ref_name }}'
      pipeline_branch: '247c69038e00f2a9e283412e902555f84b16dab2' # v1.8.0 renovate: depName=Netcracker/qubership-test-pipelines
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}

